<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" width="560">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;display=swap');
    text { font-family: 'Fira Code', monospace; }
    .prompt { fill: #bc8cff; }
    .path   { fill: #58a6ff; }
    .cmd    { fill: #e6edf3; }
    .out    { fill: #3fb950; }
    .muted  { fill: #8b949e; }
    .cursor { fill: #3fb950; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* skill lines cycling */
    .sk1 { animation: sk1 9s infinite; }
    .sk2 { animation: sk2 9s infinite; }
    .sk3 { animation: sk3 9s infinite; }

    @keyframes sk1 {
      0%   { opacity:0; clip-path:inset(0 100% 0 0); }
      2%   { opacity:1; clip-path:inset(0 100% 0 0); }
      14%  { opacity:1; clip-path:inset(0 0% 0 0); }
      30%  { opacity:1; clip-path:inset(0 0% 0 0); }
      33%  { opacity:0; clip-path:inset(0 0% 0 0); }
      100% { opacity:0; }
    }
    @keyframes sk2 {
      0%   { opacity:0; }
      33%  { opacity:0; clip-path:inset(0 100% 0 0); }
      35%  { opacity:1; clip-path:inset(0 100% 0 0); }
      47%  { opacity:1; clip-path:inset(0 0% 0 0); }
      63%  { opacity:1; clip-path:inset(0 0% 0 0); }
      66%  { opacity:0; }
      100% { opacity:0; }
    }
    @keyframes sk3 {
      0%   { opacity:0; }
      66%  { opacity:0; clip-path:inset(0 100% 0 0); }
      68%  { opacity:1; clip-path:inset(0 100% 0 0); }
      80%  { opacity:1; clip-path:inset(0 0% 0 0); }
      97%  { opacity:1; clip-path:inset(0 0% 0 0); }
      100% { opacity:0; }
    }

    .cur { animation: cur 9s infinite; }
    @keyframes cur {
      0%  {opacity:1} 97% {opacity:1} 100%{opacity:0}
    }
  </style>
</defs>

<!-- background -->
<rect width="560" height="260" rx="8" fill="#161b22"/>

<!-- titlebar -->
<rect width="560" height="36" rx="8" fill="#21262d"/>
<rect y="28" width="560" height="8" fill="#21262d"/>
<circle cx="18" cy="18" r="5" fill="#ff5f57"/>
<circle cx="34" cy="18" r="5" fill="#febc2e"/>
<circle cx="50" cy="18" r="5" fill="#28c840"/>
<text x="280" y="23" text-anchor="middle" font-size="11" class="muted">zsh — ffidel-sec</text>

<!-- static: whoami block -->
<text x="16" y="68"  font-size="12" class="prompt">┌──(ffidel-sec㉿arch)</text>
<text x="248" y="68" font-size="12" class="path">-[~]</text>
<text x="16" y="88"  font-size="12" class="prompt">└─$ </text>
<text x="48" y="88"  font-size="12" class="cmd">whoami</text>
<text x="16" y="108" font-size="12" class="out">ffidel-sec — Cybersecurity Enthusiast</text>

<!-- static: cat skills.txt block -->
<text x="16" y="138" font-size="12" class="prompt">┌──(ffidel-sec㉿arch)</text>
<text x="248" y="138" font-size="12" class="path">-[~]</text>
<text x="16" y="158" font-size="12" class="prompt">└─$ </text>
<text x="48" y="158" font-size="12" class="cmd">cat skills.txt</text>

<!-- animated skill lines -->
<text x="16" y="182" font-size="12" class="out sk1">Bug Bounty | Pentesting | eJPTv2</text>
<text x="16" y="182" font-size="12" class="out sk2">Web Hacking | OSINT | Recon</text>
<text x="16" y="182" font-size="12" class="out sk3">Python | Bash | Linux</text>

<!-- blinking cursor -->
<rect x="16" y="170" width="8" height="14" class="cursor cur"/>
</svg>
